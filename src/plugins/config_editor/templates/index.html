{% extends "templates/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block container %}
  <h1>{{ title }}</h1>

  {{ i18n('plugins.config_editor.subtitle') }}

  <br><br>

  {% for config_file in config_files %}
    <a href="{{ url_for('config_editor_edit_' ~ (config_file | replace('.json', ''))) }}" class="btn btn-primary" role="button">
      {{ utils.render_icon('pencil') }} {{ config_file }}
    </a>
  {% endfor %}
{% endblock %}
